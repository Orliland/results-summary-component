<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>

    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <!-- Great You scored higher than 65% of the people who
    have taken these tests. Summary Reaction 80 / 100 Memory 92 / 100 Verbal 61
    / 100 Visual 72 / 100 Continue -->

    <main class="card">
      <section class="card__head">
        <h2 class="card__title card__title">Your result</h2>
        <div class="score">
          <span class="score__title">76</span>
          <span class="score__subtitle">of 100</span>
        </div>
        <span class="card__heading">Great</span>
        <p class="card__text">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </section>
      <section class="card__body">
        <h2 class="card__title card__title--strong">Summary</h2>
        <div class="quotes">
          <div class="quote">
            <img
              class="quote__icon"
              src="./assets/images/icon-reaction.svg"
              alt=""
            />
            <label class="quote__lable">Reaction</label>
            <div class="quote__score">
              <span class="quote__mark">80</span>
              <span class="quote__mark--secondary">/ 100</span>
            </div>
          </div>
          <div class="quote">
            <img
              class="quote__icon"
              src="./assets/images/icon-memory.svg"
              alt=""
            />
            <label class="quote__lable">Memory</label>
            <div class="quote__score">
              <span class="quote__mark">91</span>
              <span class="quote__mark--secondary">/ 100</span>
            </div>
          </div>
          <div class="quote">
            <img
              class="quote__icon"
              src="./assets/images/icon-verbal.svg"
              alt=""
            />
            <label class="quote__lable">Verbal</label>
            <div class="quote__score">
              <span class="quote__mark">61</span>
              <span class="quote__mark--secondary">/ 100</span>
            </div>
          </div>
          <div class="quote">
            <img
              class="quote__icon"
              src="./assets/images/icon-visual.svg"
              alt=""
            />
            <label class="quote__lable">Visual</label>
            <div class="quote__score">
              <span class="quote__mark">72</span>
              <span class="quote__mark--secondary">/ 100</span>
            </div>
          </div>
        </div>
        <button class="button">Continue</button>
      </section>
    </main>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
